<!DOCTYPE html>
<html>
<head>
<title>수정하기</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
	<h1 class="text-2xl font-bold mb-4">{{ index + 1 }}번째 데이터 수정 중</h1>	
	<form action="/update" method="post" class="space-y-3">
        <p class="mb-2 text-gray-700">현재 값: {{ item }}</p>
		<input type="hidden" name="index" value="{{ index }}">	
		<input type="text" name="value" class="border px-3 py-2 rounded w-full">	
		<button type="submit" class="bg-black text-white px-4 py-2 rounded">
	    저장
		</button>
	</form>	
	<a href="/" class="inline-block mt-4 text-blue-600">돌아가기</a>
</body>
</html>
