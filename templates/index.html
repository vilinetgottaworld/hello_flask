<!DOCTYPE html>
<html>
<head>
    <title>음식 카드</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-100">
    <h1 class="text-2x1 font-bold mb-6">음식 카드 목록</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        {% for food in data %}
            <div class="bg-white rounded-lg shadow p-4">
                <h2 class="text-x1 font-bold mb-2">{{ food }} </h2>
                <p class="text-gray-600">맛있는 음식입니다.</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
